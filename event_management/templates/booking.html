<!DOCTYPE html>
<html>
<head>
    <title>Book Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Book Event</h2>

    <h4>{{ event.title }}</h4>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Confirm Booking
        </button>

    </form>

</div>

</body>
</html>
