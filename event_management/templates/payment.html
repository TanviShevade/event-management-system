<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Event Payment
        </h2>

        <hr>

        <h4>
            {{ booking.event.title }}
        </h4>

        <p>
            <strong>Amount:</strong>
            ₹{{ amount }}
        </p>

        <form action="{% url 'payment_success' booking.id %}"
              method="POST">

            {% csrf_token %}

            <h5 class="mb-3">
                Select Payment Method
            </h5>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="payment_method"
                       value="UPI"
                       checked>

                <label class="form-check-label">
                    UPI
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="payment_method"
                       value="Credit Card">

                <label class="form-check-label">
                    Credit Card
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="payment_method"
                       value="Debit Card">

                <label class="form-check-label">
                    Debit Card
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       name="payment_method"
                       value="Paytm">

                <label class="form-check-label">
                    Paytm Wallet
                </label>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input"
                       type="radio"
                       name="payment_method"
                       value="Net Banking">

                <label class="form-check-label">
                    Net Banking
                </label>
            </div>

            <button type="submit"
                    class="btn btn-success">
                Pay Now
            </button>

        </form>

    </div>

</div>

</body>
</html>
