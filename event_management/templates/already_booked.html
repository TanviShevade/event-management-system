<!DOCTYPE html>
<html>
<head>
    <title>Already Booked</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="alert alert-warning text-center p-5 shadow">

        <h2>
            ⚠ You Already Booked This Event

        <hr>

        <h4>
            {{ event.title }}

        <p>
            You have already booked this event and payment is already completed.
        </p>

        <a href="{% url 'my_bookings' %}"

            My Bookings
        </a>

    </div>

</div>

</body>
</html>
